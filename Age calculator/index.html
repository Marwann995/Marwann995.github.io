<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Simple Age Calculator</title>
</head>
<body>

<div class="container">

    <div class="card">

        <div class="icon">🎂</div>

        <h1>Age Calculator</h1>

        <p class="subtitle">
            Enter your birth year below to instantly calculate your age.
        </p>

        <input
            type="number"
            id="birth"
            placeholder="Example: 2008"
        >

        <button id="inserting">
            Calculate Age
        </button>

        <div id="result"></div>

    </div>

</div>

<script src="main.js"></script>

</body>
</html>
